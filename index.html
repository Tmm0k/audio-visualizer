<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oracle Eye Audio Visualizer</title>
  <style>
    :root {
      --panel-bg: rgba(5, 11, 24, 0.7);
      --panel-border: rgba(120, 210, 255, 0.28);
      --text: #d9f8ff;
      --muted: #8fb8c7;
      --hud-bg: rgba(13, 28, 52, 0.36);
      --hud-border: rgba(127, 223, 255, 0.35);
      --hud-glow: rgba(115, 220, 255, 0.4);
      --range-accent: #63dbff;
      --button-border: rgba(127, 230, 255, 0.45);
      --button-top: rgba(73, 182, 236, 0.3);
      --button-bottom: rgba(19, 92, 143, 0.25);
      --panel-toggle-top: rgba(80, 186, 232, 0.28);
      --panel-toggle-bottom: rgba(20, 61, 102, 0.3);
      --select-top: rgba(80, 186, 232, 0.28);
      --select-bottom: rgba(12, 27, 48, 0.72);
      --joy-top: rgba(85, 182, 224, 0.3);
      --joy-bottom: rgba(20, 57, 95, 0.3);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
    }

    #viz {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    #viz canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(320px, calc(100vw - 32px));
      backdrop-filter: blur(8px) saturate(140%);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 12px 12px 10px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      z-index: 10;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-18px) scale(0.985);
    }

    .panel-toggle {
      position: fixed;
      top: 16px;
      left: 350px;
      z-index: 13;
      border-radius: 999px;
      border: 1px solid var(--hud-border);
      background: linear-gradient(180deg, var(--panel-toggle-top), var(--panel-toggle-bottom));
      box-shadow:
        inset 0 0 14px rgba(111, 215, 255, 0.16),
        0 0 16px rgba(31, 130, 180, 0.24);
      backdrop-filter: blur(7px) saturate(145%);
      color: #d8f6ff;
      transition: left 220ms ease, filter 160ms ease;
      white-space: nowrap;
    }

    body.panel-collapsed .panel-toggle {
      left: 16px;
    }

    .panel h1 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c9f5ff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      font-size: 12px;
      color: var(--muted);
    }

    .row strong {
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.01em;
    }

    input[type="range"] {
      width: 140px;
      accent-color: var(--range-accent);
      cursor: pointer;
    }

    select {
      width: 140px;
      border-radius: 9px;
      border: 1px solid var(--button-border);
      color: var(--text);
      background: linear-gradient(180deg, var(--select-top), var(--select-bottom));
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
    }

    button {
      appearance: none;
      border: 1px solid var(--button-border);
      border-radius: 999px;
      color: #d9f7ff;
      background: linear-gradient(180deg, var(--button-top), var(--button-bottom));
      padding: 7px 12px;
      font-size: 12px;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.13); }

    #squintBtn.active {
      border-color: rgba(255, 169, 132, 0.75);
      background: linear-gradient(180deg, rgba(255, 118, 87, 0.5), rgba(142, 41, 33, 0.38));
      box-shadow: 0 0 20px rgba(255, 95, 66, 0.35);
    }

    #status {
      margin-top: 8px;
      min-height: 1.2em;
      font-size: 11px;
      color: #8dd5ef;
    }

    .hint {
      margin-top: 6px;
      font-size: 10px;
      color: #6f95a8;
      line-height: 1.35;
    }

    .joystick {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      width: 170px;
      height: 170px;
      border-radius: 22px;
      border: 1px solid var(--hud-border);
      background: radial-gradient(circle at 50% 40%, rgba(102, 211, 255, 0.2), var(--hud-bg));
      box-shadow:
        inset 0 0 28px rgba(114, 215, 255, 0.12),
        0 0 24px rgba(41, 132, 185, 0.24);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      padding: 9px;
      z-index: 12;
      backdrop-filter: blur(7px) saturate(150%);
    }

    .joy-btn {
      border-radius: 14px;
      border: 1px solid rgba(137, 234, 255, 0.35);
      background: linear-gradient(180deg, var(--joy-top), var(--joy-bottom));
      color: #d8f6ff;
      font-weight: 600;
      font-size: 14px;
      padding: 0;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 12px rgba(115, 211, 255, 0.16);
      user-select: none;
      touch-action: manipulation;
    }

    .joy-btn:hover,
    .joy-btn:active,
    .joy-btn.active {
      border-color: rgba(174, 241, 255, 0.85);
      box-shadow: 0 0 20px var(--hud-glow), inset 0 0 16px rgba(141, 231, 255, 0.32);
      filter: brightness(1.14);
    }

    .joystick .spacer {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="viz"></div>

  <button class="panel-toggle" id="panelToggle" aria-controls="panel" aria-expanded="true">Hide Controls</button>

  <section class="panel" id="panel">
    <h1>Sci‑Fi Eye Visualizer</h1>
    <div class="row">
      <strong>Mic</strong>
      <button id="micBtn">Enable</button>
    </div>
    <div class="row">
      <strong>Sensitivity</strong>
      <input id="sensitivity" type="range" min="0.5" max="3" step="0.05" value="1.35" />
    </div>
    <div class="row">
      <strong>Smoothing</strong>
      <input id="smooth" type="range" min="0.6" max="0.98" step="0.01" value="0.86" />
    </div>
    <div class="row">
      <strong>Background</strong>
      <input id="bgAlpha" type="range" min="0" max="0.35" step="0.01" value="0" />
    </div>
    <div class="row">
      <strong>Theme</strong>
      <select id="themeSelect" aria-label="Theme">
        <option value="matrix">Matrix</option>
        <option value="tagged">Tagged</option>
      </select>
    </div>
    <div class="row">
      <strong>Oracle Mood</strong>
      <select id="moodSelect" aria-label="Oracle Mood">
        <option value="normal">Normal</option>
        <option value="almost-angry">Almost Angry</option>
        <option value="angry">Angry</option>
      </select>
    </div>
    <div class="row">
      <strong>Squint</strong>
      <button id="squintBtn" aria-pressed="false">Off</button>
    </div>
    <div id="status">Idle / no microphone input.</div>
    <div class="hint">Press <b>H</b> to hide controls for OBS Browser Source.</div>
  </section>

  <div class="joystick" id="joystick" aria-label="Eye Direction Control">
    <div class="spacer"></div>
    <button class="joy-btn" data-dir="up" aria-label="Look up">▲</button>
    <div class="spacer"></div>
    <button class="joy-btn" data-dir="left" aria-label="Look left">◀</button>
    <button class="joy-btn" data-dir="center" aria-label="Center eye">◎</button>
    <button class="joy-btn" data-dir="right" aria-label="Look right">▶</button>
    <div class="spacer"></div>
    <button class="joy-btn" data-dir="down" aria-label="Look down">▼</button>
    <div class="spacer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script>
    const panel = document.getElementById('panel');
    const panelToggle = document.getElementById('panelToggle');
    const micBtn = document.getElementById('micBtn');
    const statusEl = document.getElementById('status');
    const sensitivityEl = document.getElementById('sensitivity');
    const smoothEl = document.getElementById('smooth');
    const bgAlphaEl = document.getElementById('bgAlpha');
    const themeSelectEl = document.getElementById('themeSelect');
    const moodSelectEl = document.getElementById('moodSelect');
    const squintBtn = document.getElementById('squintBtn');
    const joyBtns = Array.from(document.querySelectorAll('.joy-btn'));

    const STORAGE_KEYS = {
      theme: 'oracleTheme',
      mood: 'oracleMood',
      squint: 'oracleManualSquint',
    };

    const THEMES = {
      matrix: {
        ui: {
          panelBg: 'rgba(5, 11, 24, 0.7)',
          panelBorder: 'rgba(120, 210, 255, 0.28)',
          text: '#d9f8ff',
          muted: '#8fb8c7',
          hudBg: 'rgba(13, 28, 52, 0.36)',
          hudBorder: 'rgba(127, 223, 255, 0.35)',
          hudGlow: 'rgba(115, 220, 255, 0.4)',
          rangeAccent: '#63dbff',
          buttonBorder: 'rgba(127, 230, 255, 0.45)',
          buttonTop: 'rgba(73, 182, 236, 0.3)',
          buttonBottom: 'rgba(19, 92, 143, 0.25)',
          panelToggleTop: 'rgba(80, 186, 232, 0.28)',
          panelToggleBottom: 'rgba(20, 61, 102, 0.3)',
          selectTop: 'rgba(80, 186, 232, 0.28)',
          selectBottom: 'rgba(12, 27, 48, 0.72)',
          joyTop: 'rgba(85, 182, 224, 0.3)',
          joyBottom: 'rgba(20, 57, 95, 0.3)',
        },
        palette: {
          coolMain: [88, 224, 255],
          coolAux: [84, 150, 255],
          midMain: [108, 245, 255],
          midAux: [144, 104, 255],
          hotMain: [255, 84, 70],
          hotAux: [255, 124, 92],
        },
      },
      tagged: {
        ui: {
          panelBg: 'rgba(5, 16, 25, 0.74)',
          panelBorder: 'rgba(76, 174, 187, 0.35)',
          text: '#daf5f7',
          muted: '#88b8bf',
          hudBg: 'rgba(10, 26, 31, 0.43)',
          hudBorder: 'rgba(91, 187, 201, 0.4)',
          hudGlow: 'rgba(70, 171, 187, 0.46)',
          rangeAccent: '#2a8390',
          buttonBorder: 'rgba(91, 187, 201, 0.53)',
          buttonTop: 'rgba(52, 154, 170, 0.32)',
          buttonBottom: 'rgba(14, 65, 76, 0.36)',
          panelToggleTop: 'rgba(52, 154, 170, 0.32)',
          panelToggleBottom: 'rgba(14, 65, 76, 0.36)',
          selectTop: 'rgba(52, 154, 170, 0.32)',
          selectBottom: 'rgba(12, 36, 42, 0.74)',
          joyTop: 'rgba(56, 167, 182, 0.34)',
          joyBottom: 'rgba(12, 54, 64, 0.35)',
        },
        palette: {
          coolMain: [42, 131, 144],
          coolAux: [52, 149, 166],
          midMain: [77, 192, 206],
          midAux: [112, 168, 218],
          hotMain: [255, 120, 88],
          hotAux: [255, 168, 118],
        },
      },
    };

    const ORACLE_MOODS = {
      normal: { hotMain: null, hotAux: null },
      'almost-angry': { hotMain: [255, 136, 64], hotAux: [255, 182, 110] },
      angry: { hotMain: [255, 64, 64], hotAux: [255, 112, 112] },
    };

    function clamp(v, a = 0, b = 1) {
      return Math.max(a, Math.min(b, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function mixColor(c1, c2, t) {
      return [
        Math.round(lerp(c1[0], c2[0], t)),
        Math.round(lerp(c1[1], c2[1], t)),
        Math.round(lerp(c1[2], c2[2], t)),
      ];
    }

    const state = {
      audioCtx: null,
      analyser: null,
      source: null,
      stream: null,
      data: null,
      hasMic: false,
      sensitivity: Number(sensitivityEl.value),
      smoothing: Number(smoothEl.value),
      bgAlpha: Number(bgAlphaEl.value),
      level: 0,
      levelFast: 0,
      peakHold: 0,
      t: 0,
      pulse: 0,
      phase: Math.random() * Math.PI * 2,
      shimmer: Math.random() * Math.PI * 2,
      waveSeed: [Math.random() * 10, Math.random() * 10, Math.random() * 10],
      speakingThreshold: 0.2,
      ringActivity: 0,
      squint: false,
      squintAmt: 0,
      theme: localStorage.getItem(STORAGE_KEYS.theme) || 'matrix',
      mood: localStorage.getItem(STORAGE_KEYS.mood) || 'normal',
      eyeTarget: { x: 0, y: 0 },
      eyeCurrent: { x: 0, y: 0 },
      direction: 'center',
    };


    state.squint = localStorage.getItem(STORAGE_KEYS.squint) === '1';
    if (!THEMES[state.theme]) state.theme = 'matrix';
    if (!ORACLE_MOODS[state.mood]) state.mood = 'normal';

    function applyTheme(themeName) {
      const theme = THEMES[themeName] || THEMES.matrix;
      const root = document.documentElement.style;
      root.setProperty('--panel-bg', theme.ui.panelBg);
      root.setProperty('--panel-border', theme.ui.panelBorder);
      root.setProperty('--text', theme.ui.text);
      root.setProperty('--muted', theme.ui.muted);
      root.setProperty('--hud-bg', theme.ui.hudBg);
      root.setProperty('--hud-border', theme.ui.hudBorder);
      root.setProperty('--hud-glow', theme.ui.hudGlow);
      root.setProperty('--range-accent', theme.ui.rangeAccent);
      root.setProperty('--button-border', theme.ui.buttonBorder);
      root.setProperty('--button-top', theme.ui.buttonTop);
      root.setProperty('--button-bottom', theme.ui.buttonBottom);
      root.setProperty('--panel-toggle-top', theme.ui.panelToggleTop);
      root.setProperty('--panel-toggle-bottom', theme.ui.panelToggleBottom);
      root.setProperty('--select-top', theme.ui.selectTop);
      root.setProperty('--select-bottom', theme.ui.selectBottom);
      root.setProperty('--joy-top', theme.ui.joyTop);
      root.setProperty('--joy-bottom', theme.ui.joyBottom);
    }

    function setTheme(themeName) {
      state.theme = THEMES[themeName] ? themeName : 'matrix';
      themeSelectEl.value = state.theme;
      applyTheme(state.theme);
      localStorage.setItem(STORAGE_KEYS.theme, state.theme);
    }

    function setMood(mood) {
      state.mood = ORACLE_MOODS[mood] ? mood : 'normal';
      moodSelectEl.value = state.mood;
      localStorage.setItem(STORAGE_KEYS.mood, state.mood);
    }

    function updateSquintButton() {
      squintBtn.classList.toggle('active', state.squint);
      squintBtn.textContent = state.squint ? 'On' : 'Off';
      squintBtn.setAttribute('aria-pressed', String(state.squint));
    }

    function setManualSquint(enabled) {
      state.squint = enabled;
      updateSquintButton();
      localStorage.setItem(STORAGE_KEYS.squint, state.squint ? '1' : '0');
    }

    function setPanelVisible(visible) {
      panel.classList.toggle('hidden', !visible);
      document.body.classList.toggle('panel-collapsed', !visible);
      panelToggle.textContent = visible ? 'Hide Controls' : 'Show Controls';
      panelToggle.setAttribute('aria-expanded', String(visible));
    }

    window.setPanelVisible = setPanelVisible;

    async function enableMic() {
      if (state.hasMic) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = state.smoothing;

        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);

        state.stream = stream;
        state.audioCtx = audioCtx;
        state.analyser = analyser;
        state.source = source;
        state.data = new Uint8Array(analyser.frequencyBinCount);
        state.hasMic = true;

        micBtn.textContent = 'Enabled';
        statusEl.textContent = 'Microphone active.';
      } catch (err) {
        statusEl.textContent = 'Microphone unavailable: ' + (err && err.message ? err.message : err);
      }
    }

    function setDirection(direction) {
      const map = {
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 },
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        center: { x: 0, y: 0 },
      };
      const target = map[direction] || map.center;
      state.eyeTarget.x = target.x;
      state.eyeTarget.y = target.y;
      state.direction = direction;
      joyBtns.forEach((btn) => btn.classList.toggle('active', btn.dataset.dir === direction));
    }

    micBtn.addEventListener('click', enableMic);

    sensitivityEl.addEventListener('input', () => {
      state.sensitivity = Number(sensitivityEl.value);
    });

    smoothEl.addEventListener('input', () => {
      state.smoothing = Number(smoothEl.value);
      if (state.analyser) state.analyser.smoothingTimeConstant = state.smoothing;
    });

    bgAlphaEl.addEventListener('input', () => {
      state.bgAlpha = Number(bgAlphaEl.value);
    });

    squintBtn.addEventListener('click', () => {
      setManualSquint(!state.squint);
    });

    themeSelectEl.addEventListener('change', () => setTheme(themeSelectEl.value));
    moodSelectEl.addEventListener('change', () => setMood(moodSelectEl.value));

    joyBtns.forEach((btn) => {
      btn.addEventListener('click', () => setDirection(btn.dataset.dir));
    });

    panelToggle.addEventListener('click', () => {
      setPanelVisible(panel.classList.contains('hidden'));
    });

    window.addEventListener('keydown', (ev) => {
      const k = ev.key.toLowerCase();
      if (k === 'h') {
        setPanelVisible(panel.classList.contains('hidden'));
        return;
      }

      const keyMap = {
        arrowleft: 'left',
        arrowright: 'right',
        arrowup: 'up',
        arrowdown: 'down',
        '0': 'center',
        c: 'center',
      };

      const dir = keyMap[k];
      if (dir) {
        ev.preventDefault();
        setDirection(dir);
      }
    });

    function sampleAudio() {
      if (!state.analyser || !state.data) {
        state.levelFast *= 0.94;
        state.level *= 0.975;
        state.ringActivity = lerp(state.ringActivity, 0, 0.08);
        return;
      }

      state.analyser.getByteFrequencyData(state.data);

      let low = 0;
      let mid = 0;
      let high = 0;
      const n = state.data.length;

      for (let i = 1; i < n; i++) {
        const v = state.data[i] / 255;
        if (i < n * 0.13) low += v;
        else if (i < n * 0.45) mid += v;
        else high += v;
      }

      low /= Math.max(1, Math.floor(n * 0.13));
      mid /= Math.max(1, Math.floor(n * 0.32));
      high /= Math.max(1, Math.floor(n * 0.55));

      const weighted = (low * 0.62 + mid * 1.45 + high * 0.45) / 2.52;
      const mapped = clamp(Math.pow(weighted * state.sensitivity * 1.15, 1.03));

      state.levelFast = lerp(state.levelFast, mapped, 0.52);
      state.level = lerp(state.level, state.levelFast, mapped > state.level ? 0.42 : 0.15);
      state.peakHold = Math.max(state.level, state.peakHold * 0.94);
      state.pulse = (state.pulse + 0.11 + mapped * 0.52) % (Math.PI * 2);

      const speechEnergy = clamp((state.level - state.speakingThreshold) / (1 - state.speakingThreshold));
      const speaking = speechEnergy > 0.02;
      state.ringActivity = lerp(state.ringActivity, speechEnergy, speaking ? 0.34 : 0.12);

      if (state.level > 0.8) statusEl.textContent = 'Attack mode / energized.';
      else if (speaking) statusEl.textContent = 'Reactive / tracking voice.';
      else statusEl.textContent = state.hasMic ? 'Idle scanning.' : 'Idle / no microphone input.';
    }

    const sketch = (p) => {
      p.setup = () => {
        const holder = document.getElementById('viz');
        const canvas = p.createCanvas(window.innerWidth, window.innerHeight);
        canvas.parent(holder);
        p.pixelDensity(Math.min(window.devicePixelRatio || 1, 2));
        p.noiseSeed(Math.floor(Math.random() * 1e6));
      };

      p.windowResized = () => {
        p.resizeCanvas(window.innerWidth, window.innerHeight);
      };

      function drawWavefronts(cx, cy, baseR, energy, attack, palette) {
        const active = state.ringActivity;
        if (active < 0.02) return;

        const rings = 6;
        for (let i = 0; i < rings; i++) {
          const phase = (state.t * (0.95 + i * 0.11) + state.waveSeed[i % state.waveSeed.length]) % 1;
          const spread = baseR * (1.08 + i * 0.3 + phase * (1.75 + energy * 1.45));
          const alpha = (1 - phase) * (0.24 + energy * 0.28) * (1 - i / rings) * (0.55 + active * 0.7);
          const wobble = Math.sin((state.t + i) * 2.3) * baseR * 0.015;

          const c = i % 2 ? palette.main : palette.aux;
          p.noFill();
          p.stroke(c[0], c[1], c[2], (alpha + attack * 0.05 * active) * 255);
          p.strokeWeight(Math.max(1.05, baseR * (0.022 - i * 0.0032)));

          p.beginShape();
          const points = 95;
          for (let point = 0; point <= points; point++) {
            const a = (point / points) * Math.PI * 2;
            const ripple = Math.sin(a * 3 + state.t * 4.2 + i) * baseR * 0.022 * (0.55 + energy * 1.1) * (0.45 + active * 0.9);
            const rr = spread + wobble + ripple;
            p.vertex(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr);
          }
          p.endShape(p.CLOSE);
        }
      }

      function drawBeam(cx, cy, baseR, energy, attack, palette) {
        const beamPower = clamp((energy - 0.62) / 0.38) * (0.6 + attack * 0.4);
        if (beamPower <= 0.02) return;

        const length = Math.min(p.width, p.height) * (0.42 + beamPower * 0.45);
        const width = baseR * (0.08 + beamPower * 0.26);
        const flicker = 1 + Math.sin(state.t * 34) * 0.06;
        const endX = cx + length;

        const grad = p.drawingContext.createLinearGradient(cx, cy, endX, cy);
        grad.addColorStop(0, `rgba(255,250,245,${0.68 * beamPower})`);
        grad.addColorStop(0.12, `rgba(${palette.hot[0]},${palette.hot[1]},${palette.hot[2]},${0.52 * beamPower})`);
        grad.addColorStop(0.55, `rgba(${palette.main[0]},${palette.main[1]},${palette.main[2]},${0.25 * beamPower})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');

        p.push();
        p.blendMode(p.SCREEN);
        p.noStroke();
        p.drawingContext.fillStyle = grad;
        p.beginShape();
        p.vertex(cx + baseR * 0.4, cy - width * flicker);
        p.vertex(endX, cy - width * 0.32);
        p.vertex(endX, cy + width * 0.32);
        p.vertex(cx + baseR * 0.4, cy + width * flicker);
        p.endShape(p.CLOSE);

        const core = p.drawingContext.createLinearGradient(cx, cy, endX, cy);
        core.addColorStop(0, `rgba(255,255,255,${0.9 * beamPower})`);
        core.addColorStop(0.28, `rgba(${palette.hot[0]},${palette.hot[1]},${palette.hot[2]},${0.45 * beamPower})`);
        core.addColorStop(1, 'rgba(255,255,255,0)');
        p.drawingContext.strokeStyle = core;
        p.strokeWeight(Math.max(1.2, width * 0.18));
        p.line(cx + baseR * 0.3, cy, endX, cy);
        p.pop();
      }

      function drawEye(cx, cy, baseR, energy, attack, palette) {
        const irisPulse = Math.sin(state.pulse) * 0.5 + 0.5;
        const liveShimmer = Math.sin(state.t * 3.5 + state.shimmer) * 0.5 + 0.5;
        const breathe = 1 + Math.sin(state.t * 1.45 + state.phase) * 0.02 + energy * 0.07;

        const irisR = baseR * (0.88 - energy * 0.09 + irisPulse * 0.025);
        const pupilR = baseR * (0.19 - energy * 0.08 + liveShimmer * 0.01);
        const coreR = baseR * (0.12 + energy * 0.055);

        const eyeOffsetX = state.eyeCurrent.x * baseR * 0.24;
        const eyeOffsetY = state.eyeCurrent.y * baseR * 0.2;
        const irisCx = cx + eyeOffsetX;
        const irisCy = cy + eyeOffsetY;

        const aperture = 1 - state.squintAmt * 0.38;
        const focus = 1 + state.squintAmt * 0.2;

        const bloomRadius = baseR * (2 + energy * 1.7 + attack * 1.2 + state.squintAmt * 0.2);
        const bloom = p.drawingContext.createRadialGradient(cx, cy, 0, cx, cy, bloomRadius);
        bloom.addColorStop(0, `rgba(${palette.hot[0]},${palette.hot[1]},${palette.hot[2]},${0.28 + attack * 0.2})`);
        bloom.addColorStop(0.4, `rgba(${palette.main[0]},${palette.main[1]},${palette.main[2]},${0.1 + energy * 0.14})`);
        bloom.addColorStop(1, 'rgba(0,0,0,0)');
        p.noStroke();
        p.drawingContext.fillStyle = bloom;
        p.circle(cx, cy, bloomRadius * 2);

        p.push();
        p.translate(cx, cy);
        p.scale(breathe, 1 / breathe);
        p.translate(-cx, -cy);

        const ringAlpha = state.ringActivity;
        if (ringAlpha > 0.02) {
          for (let i = 0; i < 4; i++) {
            const ringR = baseR * (1.05 + i * 0.24 + Math.sin(state.t * 1.1 + i) * 0.012);
            const seg = 16 + i * 6;
            const c = i % 2 ? palette.aux : palette.main;
            p.stroke(c[0], c[1], c[2], (0.15 + energy * 0.17 - i * 0.025) * 255 * ringAlpha);
            p.strokeWeight(Math.max(1, baseR * (0.016 - i * 0.002)));
            p.noFill();

            for (let s = 0; s < seg; s++) {
              const a0 = (s / seg) * Math.PI * 2 + state.t * (0.07 + i * 0.04);
              const a1 = a0 + (Math.PI * 2 / seg) * (0.45 + 0.15 * Math.sin(state.t * 2 + s));
              if (s % 2 === 0 || i % 2 === 1) {
                p.arc(cx, cy, ringR * 2, ringR * 2, a0, a1);
              }
            }
          }
        }

        p.push();
        p.translate(cx, cy);
        p.scale(1, aperture);
        p.translate(-cx, -cy);

        const iris = p.drawingContext.createRadialGradient(irisCx, irisCy, pupilR * 0.2, irisCx, irisCy, irisR);
        iris.addColorStop(0, `rgba(${palette.hot[0]},${palette.hot[1]},${palette.hot[2]},0.95)`);
        iris.addColorStop(0.28, `rgba(${palette.main[0]},${palette.main[1]},${palette.main[2]},0.85)`);
        iris.addColorStop(0.64, `rgba(${palette.aux[0]},${palette.aux[1]},${palette.aux[2]},0.54)`);
        iris.addColorStop(1, 'rgba(0,0,0,0)');
        p.noStroke();
        p.drawingContext.fillStyle = iris;
        p.circle(irisCx, irisCy, irisR * 2 * focus);

        p.noFill();
        p.stroke(palette.hot[0], palette.hot[1], palette.hot[2], (0.75 + attack * 0.15 + state.squintAmt * 0.05) * 255);
        p.strokeWeight(baseR * 0.022);
        p.circle(irisCx, irisCy, irisR * (0.83 + liveShimmer * 0.02) * 2 * focus);

        const pupil = p.drawingContext.createRadialGradient(irisCx, irisCy, 0, irisCx, irisCy, pupilR * 1.45);
        pupil.addColorStop(0, 'rgba(255,255,255,0.95)');
        pupil.addColorStop(0.35, `rgba(${palette.hot[0]},${palette.hot[1]},${palette.hot[2]},0.9)`);
        pupil.addColorStop(1, 'rgba(8,10,18,0.95)');
        p.drawingContext.fillStyle = pupil;
        p.noStroke();
        p.circle(irisCx, irisCy, pupilR * 2 * (1 + state.squintAmt * 0.06));

        p.fill(255, 255, 255, 230);
        p.circle(
          irisCx + Math.cos(state.t * 1.2) * coreR * 0.35,
          irisCy + Math.sin(state.t * 1.5) * coreR * 0.28,
          coreR * 2
        );


        p.pop();

        // Removed horizontal top/bottom shutter overlays per latest visual request.

        p.pop();
      }

      p.draw = () => {
        sampleAudio();

        state.t += 0.012 + state.level * 0.02;
        state.eyeCurrent.x = lerp(state.eyeCurrent.x, state.eyeTarget.x, 0.085);
        state.eyeCurrent.y = lerp(state.eyeCurrent.y, state.eyeTarget.y, 0.085);
        const moodConfig = ORACLE_MOODS[state.mood] || ORACLE_MOODS.normal;
        state.squintAmt = lerp(state.squintAmt, state.squint ? 1 : 0, 0.1);

        if (state.bgAlpha > 0) {
          p.background(2, 6, 16, state.bgAlpha * 255);
        } else {
          p.clear();
        }

        const cx = p.width * 0.5;
        const cy = p.height * 0.5;
        const baseR = Math.min(p.width, p.height) * 0.12;

        const energy = clamp(state.level * 1.15 + Math.sin(state.t * 1.4) * 0.03 + 0.05);
        const attack = clamp((energy - 0.67) / 0.33);

        const theme = THEMES[state.theme] || THEMES.matrix;
        const themePalette = theme.palette;

        const mediumMix = clamp((energy - 0.25) / 0.45);
        const emotionMain = moodConfig.hotMain || themePalette.hotMain;
        const emotionAux = moodConfig.hotAux || themePalette.hotAux;
        const main = mixColor(mixColor(themePalette.coolMain, themePalette.midMain, mediumMix), emotionMain, attack);
        const aux = mixColor(mixColor(themePalette.coolAux, themePalette.midAux, mediumMix), emotionAux, attack);
        const hot = mixColor([232, 255, 255], moodConfig.hotMain ? [255, 242, 225] : [255, 235, 235], attack);
        const palette = { main, aux, hot };

        drawWavefronts(cx, cy, baseR, energy, attack, palette);
        drawBeam(cx, cy, baseR, energy, attack, palette);
        drawEye(cx, cy, baseR, energy, attack, palette);
      };
    };

    updateSquintButton();
    setTheme(state.theme);
    setMood(state.mood);
    setDirection('center');
    if (typeof window.setPanelVisible === 'function') {
      window.setPanelVisible(true);
    }
    new p5(sketch);
  </script>
</body>
</html>
